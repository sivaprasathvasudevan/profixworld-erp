<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="manifest" href="/adminapp.webmanifest">
<link rel="apple-touch-icon" href="/adminapp-192.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ProFix">
<meta property="og:title" content="ProFix Admin">
<meta property="og:description" content="ProFix staff console — orders, repairs, day-close.">
<meta property="og:image" content="https://profixworld.com/og-cover.png">
<meta property="og:url" content="https://profixworld.com/admin.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ProFix Admin">
<meta name="twitter:image" content="https://profixworld.com/og-cover.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#E11D2A" />
<title>ProFix Ops — Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E11D2A; --orange:#FF6A2B; --ink:#171821; --ink2:#3D4049; --muted:#7A7E89;
  --bg:#F6F7F9; --card:#FFFFFF; --line:#ECEDF1; --line2:#E2E3E8;
  --grad:linear-gradient(135deg,#FF6A2B,#E11D2A);
  --green:#12A150; --green-soft:#E7F7EE; --blue:#2563EB; --purple:#7C3AED; --teal:#0EA5A5; --yellow:#FFC400;
  --r:16px; --sans:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif; --ease:cubic-bezier(.2,.9,.3,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --sh:0 1px 2px rgba(20,22,30,.04),0 8px 24px -12px rgba(20,22,30,.12);
  --navh:64px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.5;-webkit-text-size-adjust:100%}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font-family:inherit}
.bgwrap{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none;background:linear-gradient(180deg,#FFF3EE,#F6F7F9 40%)}
.blob{position:absolute;border-radius:50%;filter:blur(64px);opacity:.45}
.b1{width:60vw;height:60vw;max-width:520px;max-height:520px;background:radial-gradient(circle,#FFC7A6,transparent 66%);top:-16vw;left:-12vw}
.b2{width:52vw;height:52vw;max-width:480px;max-height:480px;background:radial-gradient(circle,#FFB3BC,transparent 68%);top:-6vw;right:-16vw}

.btn{font-weight:700;font-size:.92rem;padding:.8rem 1.2rem;border-radius:12px;cursor:pointer;border:none;display:inline-flex;align-items:center;justify-content:center;gap:.45rem;transition:.15s var(--ease)}
.btn-red{background:var(--grad);color:#fff;box-shadow:0 8px 20px -8px rgba(225,29,42,.5)}
.btn-red:active{transform:scale(.98)}
.btn-ghost{background:#fff;border:1.5px solid var(--line2);color:var(--ink)}
.btn:disabled{opacity:.55;cursor:not-allowed}

/* ---- login ---- */
.login{min-height:100vh;display:grid;place-items:center;padding:20px}
.login-card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--sh);padding:2rem 1.6rem;width:100%;max-width:380px}
.brand{display:flex;align-items:center;gap:.55rem;font-weight:800;font-size:1.5rem;letter-spacing:-.03em;justify-content:center;margin-bottom:.3rem}
.brand .mark{width:38px;height:38px;border-radius:11px;background:var(--grad);display:grid;place-items:center;box-shadow:0 6px 14px -6px rgba(225,29,42,.5)}
.brand .mark svg{width:20px;height:20px;fill:#fff}
.brand b{color:var(--red)}
.login-card .sub{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:1.4rem;font-weight:500}
.field{margin-bottom:.8rem}
.field label{display:block;font-size:.78rem;font-weight:700;color:var(--ink2);margin-bottom:.3rem}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1.5px solid transparent;border-radius:11px;padding:.8rem .9rem;font-size:1rem;outline:none;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red);background:#fff}
.err{color:var(--red);font-size:.82rem;font-weight:600;margin-top:.5rem;min-height:1em;text-align:center}

/* ---- app shell ---- */
.app{display:none}
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.topbar-in{max-width:720px;margin:0 auto;padding:.6rem 14px;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.topbar .brand{font-size:1.1rem;margin:0}
.topbar .brand .mark{width:28px;height:28px;border-radius:8px}
.topbar .brand .mark svg{width:15px;height:15px}
.tb-right{display:flex;gap:.4rem;align-items:center}
.shift-chip{display:inline-flex;align-items:center;gap:.3rem;background:var(--bg);border:1px solid var(--line2);border-radius:20px;padding:.35rem .7rem;font-size:.78rem;font-weight:700;color:var(--ink2);cursor:pointer;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{width:36px;height:36px;border-radius:10px;background:var(--bg);border:none;cursor:pointer;display:grid;place-items:center;flex:0 0 auto}
.icon-btn svg{width:18px;height:18px;stroke:var(--ink2);fill:none;stroke-width:2}
.wrap{max-width:720px;margin:0 auto;padding:14px 14px calc(var(--navh) + 28px)}
.screen{display:none;animation:fade .25s var(--ease)}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.sc-title{font-weight:800;font-size:1.25rem;letter-spacing:-.02em;margin:.2rem 0 .8rem}
.sc-title small{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-top:.1rem}

/* ---- bottom nav ---- */
.bnav{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.bnav-in{max-width:720px;margin:0 auto;height:var(--navh);display:grid;grid-template-columns:repeat(5,1fr)}
.nav-btn{border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.15rem;color:var(--muted);font-size:.68rem;font-weight:700;position:relative;padding-top:.2rem}
.nav-btn svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2}
.nav-btn.on{color:var(--red)}
.nav-btn .dot{position:absolute;top:6px;right:calc(50% - 20px);min-width:16px;height:16px;line-height:16px;padding:0 4px;border-radius:8px;background:var(--red);color:#fff;font-size:.6rem;font-weight:800}

/* ---- filter chips ---- */
.fchips{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:.4rem;scrollbar-width:none}
.fchips::-webkit-scrollbar{display:none}
.fchip{flex:0 0 auto;padding:.45rem .9rem;border-radius:20px;background:#fff;border:1px solid var(--line);font-size:.82rem;font-weight:700;color:var(--ink2);cursor:pointer;white-space:nowrap}
.fchip.active{background:var(--ink);color:#fff;border-color:transparent}

/* ---- cards ---- */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:.95rem;margin-bottom:.7rem;animation:in .3s var(--ease)}
@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card.fresh{border-color:var(--orange);box-shadow:0 0 0 2px rgba(255,106,43,.22),var(--sh)}
.chead{display:flex;align-items:flex-start;justify-content:space-between;gap:.6rem;margin-bottom:.35rem}
.who{font-weight:800;font-size:1.05rem;letter-spacing:-.01em}
.meta{font-size:.75rem;color:var(--muted);margin-top:.1rem}
.pill{font-size:.66rem;font-weight:800;letter-spacing:.03em;text-transform:uppercase;padding:.28rem .55rem;border-radius:7px;white-space:nowrap}
.p-new{background:#FFF1E5;color:#C2600A}
.p-confirmed,.p-accepted{background:#E7EEFF;color:#2547B0}
.p-packed,.p-preparing{background:#F0E9FE;color:#6B3FD4}
.p-out_for_delivery,.p-picked_up,.p-in_progress{background:#DDF6F5;color:#0A7E79}
.p-ready{background:#FFF7CC;color:#8A6D00}
.p-delivered{background:var(--green-soft);color:var(--green)}
.p-cancelled,.p-rejected{background:#F1F1F4;color:#8A8A96}
.p-requested{background:#FFF1E5;color:#C2600A}
.p-approved,.p-contacted{background:#E7EEFF;color:#2547B0}
.p-refunded,.p-done{background:var(--green-soft);color:var(--green)}
.items{background:var(--bg);border-radius:10px;padding:.6rem .75rem;font-size:.86rem;margin:.5rem 0;line-height:1.55}
.items .it{display:flex;justify-content:space-between;gap:.5rem}
.addr{font-size:.85rem;color:var(--ink2);margin:.45rem 0}
.addr b{color:var(--ink)}
.note-x{font-size:.8rem;color:var(--muted);margin:.35rem 0}
.tot{font-weight:800;font-size:1.1rem;margin:.35rem 0 .1rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.tot small{font-weight:700;color:var(--muted);font-size:.7rem;background:var(--bg);padding:.15rem .5rem;border-radius:6px}
.tot .codok{color:var(--green);font-size:.72rem;font-weight:800}
.actrow{display:flex;gap:.5rem;margin:.6rem 0 .2rem;flex-wrap:wrap}
.actrow a,.actrow button{flex:1 1 auto;min-width:calc(50% - .25rem);text-align:center;padding:.6rem;border-radius:11px;font-size:.84rem;font-weight:700;border:1.5px solid var(--line2);background:#fff;color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:.35rem}
.actrow .call{background:#fff}
.actrow .nav{background:#EAF2FF;border-color:#CADBFF;color:#1D4ED8}
.actrow .cod{background:#fff}
.actrow .cod.on{background:var(--green-soft);border-color:#BFE9CF;color:var(--green)}
.steps{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.55rem}
.step-btn{padding:.45rem .7rem;border-radius:9px;background:#fff;border:1.5px solid var(--line2);font-size:.78rem;font-weight:700;color:var(--ink2);cursor:pointer;transition:.12s}
.step-btn:active{transform:scale(.95)}
.step-btn.done{background:var(--green-soft);border-color:#BFE9CF;color:var(--green)}
.step-btn.next{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 6px 14px -6px rgba(225,29,42,.4)}
.step-btn.cancel{color:#b00;margin-left:auto}
.eta-row{display:flex;flex-wrap:wrap;align-items:center;gap:.4rem;margin-top:.55rem}
.eta-cur{font-size:.76rem;font-weight:800;color:var(--ink2);margin-right:auto}
.eta-cur.muted{color:var(--ink2);opacity:.55;font-weight:700}
.eta-b{padding:.4rem .6rem;border-radius:8px;background:#fff;border:1.5px solid var(--line2);font-size:.74rem;font-weight:800;color:var(--ink2);cursor:pointer;font-family:inherit}
.eta-b:active{transform:scale(.95)}
.eta-b.clr{color:#b00;border-color:#f2c4c4}
.otp-row{display:flex;flex-wrap:wrap;align-items:center;gap:.45rem;margin-top:.55rem;padding:.5rem .6rem;background:#fff7e6;border:1.5px dashed #e6a23c;border-radius:10px}
.otp-row.done{background:#e7f7ee;border:1.5px solid #7ec89b;color:#0a7e4a;font-weight:800;font-size:.82rem}
.otp-lbl{font-size:.78rem;font-weight:800;color:#9a5b00}
.otp-code{font-size:1.15rem;font-weight:900;letter-spacing:.16em;color:#5a3600;background:#fff;border-radius:7px;padding:.05em .4em;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.otp-hint{font-size:.7rem;color:#8a6b3a;margin-right:auto}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin:.5rem 0}
.set-row label{font-size:.82rem;font-weight:700;color:var(--ink2)}
.set-row input{width:120px;text-align:right}
#admQr svg{width:220px;height:220px}
.mini-row{display:flex;gap:.5rem;margin-top:.55rem;align-items:center;font-size:.82rem;color:var(--ink2)}
.del{margin-left:auto;background:none;border:none;color:var(--muted);font-size:.76rem;font-weight:600;cursor:pointer;text-decoration:underline}
.quote-in{width:96px;background:var(--bg);border:1px solid var(--line2);border-radius:8px;padding:.4rem .5rem;font-size:.85rem;outline:none}

.empty{text-align:center;color:var(--muted);padding:2.6rem 1rem;font-size:.92rem}
.spin{width:34px;height:34px;border:3px solid var(--line2);border-top-color:var(--red);border-radius:50%;margin:2.6rem auto;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ---- new order ---- */
.search{position:relative;margin-bottom:.7rem}
.search svg{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--muted);fill:none;stroke-width:2.2}
.search input{width:100%;background:#fff;border:1px solid var(--line);border-radius:12px;padding:.75rem .8rem .75rem 2.5rem;font-size:1rem;outline:none;box-shadow:var(--sh)}
.search input:focus{border-color:var(--red)}
.catrow{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.5rem;scrollbar-width:none}
.catrow::-webkit-scrollbar{display:none}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem}
.pcard{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);padding:.6rem;display:flex;flex-direction:column;gap:.35rem}
.pcard .pimg{width:100%;aspect-ratio:1;border-radius:10px;background:var(--bg) center/cover no-repeat;display:grid;place-items:center;font-size:1.5rem;color:var(--line2)}
.pcard .pname{font-weight:700;font-size:.84rem;line-height:1.25;min-height:2.1em}
.pcard .pbrand{font-size:.7rem;color:var(--muted);font-weight:600;margin-top:-.2rem}
.pcard .pfoot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;gap:.3rem}
.pcard .pprice{font-weight:800;font-size:.9rem}
.pcard .padd{width:32px;height:32px;border-radius:9px;background:var(--grad);color:#fff;border:none;font-size:1.2rem;font-weight:700;cursor:pointer;display:grid;place-items:center;line-height:1}
.pqty{display:flex;align-items:center;gap:.4rem}
.pqty button{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--line2);background:#fff;font-weight:800;cursor:pointer;font-size:1rem;line-height:1}
.pqty b{min-width:16px;text-align:center;font-size:.9rem}

/* cart */
.cart{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh);padding:.9rem;margin-bottom:1rem}
.cart h3{font-size:.95rem;font-weight:800;margin-bottom:.6rem;display:flex;justify-content:space-between}
.citem{display:flex;align-items:center;gap:.5rem;padding:.4rem 0;border-bottom:1px dashed var(--line)}
.citem .cn{flex:1;font-size:.85rem;font-weight:600;line-height:1.2}
.citem .cn small{display:block;color:var(--muted);font-weight:600;font-size:.72rem}
.subtotal{display:flex;justify-content:space-between;font-weight:800;font-size:1.05rem;margin:.7rem 0}
.hint{font-size:.75rem;color:var(--muted);margin-top:.5rem}

/* today */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1rem}
.tstat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:1rem;box-shadow:var(--sh)}
.tstat .n{font-weight:800;font-size:1.9rem;line-height:1;letter-spacing:-.02em}
.tstat .l{font-size:.78rem;color:var(--muted);font-weight:700;margin-top:.35rem}
.tstat.rev .n{color:var(--green)} .tstat.cod .n{color:var(--orange)} .tstat.pend .n{color:var(--red)}
.tbig{background:var(--grad);color:#fff;border-radius:18px;padding:1.2rem;box-shadow:0 12px 30px -12px rgba(225,29,42,.6);margin-bottom:1rem}
.tbig .n{font-weight:800;font-size:2.4rem;line-height:1} .tbig .l{font-weight:700;opacity:.9;margin-top:.2rem}
.dc-split{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.55rem;margin-bottom:1rem}
.dc-split .s{background:#fff;border:1px solid var(--line);border-radius:14px;padding:.7rem .4rem;box-shadow:var(--sh);text-align:center}
.dc-split .s .n{font-weight:800;font-size:1.05rem;letter-spacing:-.01em}
.dc-split .s .l{font-size:.68rem;color:var(--muted);font-weight:700;margin-top:.25rem}
.rowline{display:flex;justify-content:space-between;gap:.5rem;padding:.5rem 0;border-bottom:1px dashed var(--line);font-size:.9rem}
.rowline:last-child{border-bottom:none}
.act2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin:1.1rem 0 .4rem}
.act2 button{padding:.95rem;border-radius:13px;font-weight:800;font-size:.95rem;cursor:pointer;border:none}
.act2 .cs{background:var(--grad);color:#fff;box-shadow:0 8px 20px -8px rgba(225,29,42,.5)}
.act2 .cs:active{transform:scale(.98)}
.act2 .ca{background:#fff;border:1.5px solid var(--line2);color:var(--ink)}
.sec-h{font-weight:800;font-size:.95rem;margin:1.2rem 0 .5rem}
.mv{display:flex;align-items:center;gap:.5rem;padding:.55rem .75rem;background:#fff;border:1px solid var(--line);border-radius:11px;margin-bottom:.4rem;font-size:.84rem;box-shadow:var(--sh)}
.mv .x{margin-left:auto;color:var(--muted);cursor:pointer;font-weight:800;border:none;background:none;font-size:1rem;padding:.1rem .3rem}
.hintbox{background:#FFF4E5;border:1px solid #FFD8A8;color:#92520A;border-radius:12px;padding:.7rem .8rem;font-size:.8rem;margin-bottom:.7rem}
.paybadge{font-size:.72rem;font-weight:800;background:var(--green-soft);color:var(--green);padding:.15rem .5rem;border-radius:6px}
/* bottom sheet */
.scrim{position:fixed;inset:0;background:rgba(20,22,30,.45);opacity:0;pointer-events:none;transition:.25s;z-index:200}
.scrim.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:201;background:#fff;border-radius:22px 22px 0 0;box-shadow:0 -10px 44px rgba(0,0,0,.22);transform:translateY(110%);transition:.32s var(--spring);padding:1rem 1.1rem calc(1.2rem + env(safe-area-inset-bottom));max-width:720px;margin:0 auto}
.sheet.open{transform:none}
.sheet h3{font-size:1.1rem;font-weight:800;letter-spacing:-.01em}
.sheet .sh-sub{font-size:.82rem;color:var(--muted);margin:.15rem 0 .9rem}
.sheet .grip{width:40px;height:4px;border-radius:2px;background:var(--line2);margin:0 auto .8rem}
.pay3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.3rem}
.pay3 button{padding:.85rem .3rem;border-radius:13px;border:1.5px solid var(--line2);background:#fff;font-weight:700;font-size:.88rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.25rem;color:var(--ink)}
.pay3 button .em{font-size:1.35rem;line-height:1}
.pay3 button.sel{border-color:var(--red);background:#FFF1EC;color:var(--red)}
.seg{display:flex;gap:.4rem;margin-bottom:.8rem}
.seg button{flex:1;padding:.65rem;border-radius:11px;border:1.5px solid var(--line2);background:#fff;font-weight:700;font-size:.86rem;cursor:pointer;color:var(--ink)}
.seg button.sel{background:var(--ink);color:#fff;border-color:transparent}

.toast{position:fixed;left:50%;bottom:calc(var(--navh) + 18px);transform:translateX(-50%) translateY(16px);z-index:300;background:var(--ink);color:#fff;padding:.75rem 1.2rem;border-radius:12px;font-size:.88rem;font-weight:700;opacity:0;pointer-events:none;transition:.3s var(--spring);box-shadow:0 12px 30px rgba(0,0,0,.3);max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.alert{background:var(--grad)}
.cfg{background:#FFF4E5;border:1px solid #FFD8A8;color:#92520A;border-radius:12px;padding:.9rem;font-size:.85rem;margin-bottom:1rem}
</style>
</head>
<body>
<div class="bgwrap"><span class="blob b1"></span><span class="blob b2"></span></div>

<!-- LOGIN -->
<div class="login" id="loginView">
  <div class="login-card">
    <div class="brand"><span class="mark"><svg viewBox="0 0 24 24"><path d="M13 2L4.5 13.5H11l-1 8.5L19.5 10H13z"/></svg></span>Pro<b>Fix</b></div>
    <div class="sub">Staff Operations</div>
    <div id="cfgWarn"></div>
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="field"><label>Email</label><input name="email" type="email" required placeholder="you@profix…" autocomplete="username"></div>
      <div class="field"><label>Password</label><input name="password" type="password" required placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn btn-red" style="width:100%;margin-top:.4rem" id="loginBtn" type="submit">Sign in</button>
      <div class="err" id="loginErr"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div class="app" id="appView">

/* ---- notes model: free text · Map: url · [by:Name] · [codok] ---- */
function parseNotes(raw){
  const s = raw==null? "" : String(raw);
  let map=null, by=null, cod=false, pay=null;
  let m = s.match(/Map:\s*(https?:\/\/\S+)/i) || s.match(/(https?:\/\/[^\s·]*maps[^\s·]*)/i) || s.match(/(https?:\/\/[^\s·]*(?:goo\.gl|maps\.app)[^\s·]*)/i);
  if(m) map=m[1];
  const b = s.match(/\[by:([^\]]+)\]/i); if(b) by=b[1].trim();
  if(/\[codok\]/i.test(s)) cod=true;
  const pm = s.match(/\[pay:(cash|upi|card)\]/i); if(pm) pay=pm[1].toLowerCase();
  let text = s
    .replace(/Map:\s*https?:\/\/\S+/ig,"")
    .replace(/\[by:[^\]]*\]/ig,"")
    .replace(/\[codok\]/ig,"")
    .replace(/\[pay:[^\]]*\]/ig,"")
    .replace(/(^|\s)·(\s|$)/g," ")
    .replace(/\s{2,}/g," ").trim().replace(/^[·\s]+|[·\s]+$/g,"").trim();
  return { text, map, by, cod, pay, raw:s };
}
function buildNotes(o){
  const parts=[];
  if(o.text) parts.push(o.text);
  if(o.map) parts.push("Map: "+o.map);
  if(o.by) parts.push("[by:"+o.by+"]");
  if(o.cod) parts.push("[codok]");
  if(o.pay) parts.push("[pay:"+o.pay+"]");
  return parts.join(" · ") || null;
}

let channel;
function subscribe(){
  if(channel) return;
  channel = sb.channel("profix-ops")
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"store_orders"},p=>{
       if(ORDERS.some(x=>x.id===p.new.id)) return;
       ORDERS.unshift({...p.new,_fresh:true}); renderAll(); alertNew("🛍️ New order from "+(p.new.customer_name||"customer")+"!");
    })
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"store_repairs"},p=>{
       if(REPAIRS.some(x=>x.id===p.new.id)) return;
       REPAIRS.unshift({...p.new,_fresh:true}); renderAll(); alertNew("🔧 New repair booking!");
    })
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"store_refunds"},p=>{
       if(REFUNDS.some(x=>x.id===p.new.id)) return;
       REFUNDS.unshift(p.new); renderNav(); if(screen==="more") renderMore(); alertNew("↩️ New return/refund request");
    })
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"store_services"},p=>{
       if(SERVICES.some(x=>x.id===p.new.id)) return;
       SERVICES.unshift(p.new); renderNav(); if(screen==="more") renderMore(); alertNew("📱 New mobile-service request");
    })
    .subscribe();
}

/* ---- A3: UPI QR helpers (shared by order collect flow) ---- */
function upiPayload(amount,shortid){
  const pn=encodeURIComponent(SHOP.upi_name||"ProFix");
  const tn=encodeURIComponent("ProFix order "+(shortid||""));
  return `upi://pay?pa=${encodeURIComponent(SHOP.upi_vpa)}&pn=${pn}&am=${amount}&cu=INR&tn=${tn}`;
}
let _qrQ=null;
function ensureQR(cb){
  if(window.qrcode){ cb(); return; }
  if(_qrQ){ _qrQ.push(cb); return; }
  _qrQ=[cb];
  const s=document.createElement("script");
  s.src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js";
  s.onload=()=>{ const q=_qrQ; _qrQ=null; q.forEach(f=>{ try{ f(); }catch(_){} }); };
  s.onerror=()=>{ _qrQ=null; const el=$("admQr"); if(el) el.innerHTML="QR unavailable"; };
  document.head.appendChild(s);
}
function qrInto(text,el){ if(!el) return; try{ const qr=qrcode(0,"M"); qr.addData(text); qr.make(); el.innerHTML=qr.createSvgTag({cellSize:5,margin:2,scalable:true}); }catch(_){ el.innerHTML=""; } }
function showAdminUpi(id){
  const o=ORDERS.find(x=>x.id===id); if(!o) return;
  if(!SHOP.upi_vpa){ toast("No UPI id set — add it in Settings"); return; }
  const amt=Math.max(0,Math.round(Number(o.total)||0));
  const link=upiPayload(amt,String(o.id).slice(0,6));
  openSheet(`<h3>UPI payment</h3><div class="sh-sub">${esc(o.customer_name||"Customer")} · ${inr(amt)}</div>
    <div id="admQr" style="display:flex;justify-content:center;align-items:center;min-height:200px;margin:.6rem 0">Loading QR…</div>
    <div style="text-align:center;font-size:.85rem">${esc(SHOP.upi_name||"ProFix")} · <b>${esc(SHOP.upi_vpa)}</b></div>
    <div style="text-align:center;font-size:.78rem;color:var(--ink2);margin-top:.3rem">Customer scans to pay ${inr(amt)}</div>`);
  ensureQR(()=>qrInto(link,$("admQr")));
}

function etaStr(ts){ const d=new Date(ts); return (isToday(ts)?"Today ":d.toLocaleDateString("en-IN",{day:"2-digit",month:"short"})+" ")+d.toLocaleTimeString("en-IN",{hour:"numeric",minute:"2-digit"}); }
function etaRow(o){

async function setEta(id,mins){
  const o=ORDERS.find(x=>x.id===id); if(!o) return;

  const prev=o.eta_at; o.eta_at=val; renderOrders();

const VISIT_LBL={assigned:"Assigned",on_the_way:"On the way",reached:"Reached",repaired:"Repaired",collected:"Collected"};
function seniorTechs(){
  const active=(STAFF||[]).filter(s=>s.active!==false);

  return { list: t.length?t:active, matched: t.length>0 };

function techRow(o){
  if(!SCHEMA.repairVisit || isDone(o.status)) return "";

  const cur=o.assigned_staff_id, who=cur?staffName(cur):null, vs=o.visit_status;
  const amt=(o.amount_collected!=null&&o.amount_collected!=="")?` · ₹${o.amount_collected} collected`:"";
  const chips=list.map(s=>`<button class="eta-b" ${String(cur)===String(s.id)?'style="background:var(--green);color:#fff;border-color:var(--green)"':''} onclick="assignTech('${o.id}','${s.id}')">${esc(s.name)}${s.designation?" · "+esc(s.designation):""}</button>`).join("");
  const head = who ? `<span class="eta-cur">🛠 ${esc(who)}${vs?" · "+(VISIT_LBL[vs]||vs):""}${amt}</span>` : `<span class="eta-cur muted">Assign tech</span>`;

async function assignTech(id,sid){

}

function stepButtons(x,flow,fn,st){
  const idx=flow.findIndex(([k])=>k===st);
  const btns=flow.map(([k,l],i)=>{
    const cls = i<idx?"done":(i===idx+1?"next":"");
    const cur = i===idx;
    return `<button class="step-btn ${cls}" ${cur?'disabled style="opacity:.5"':''} onclick="${fn}('${x.id}','${k}')">${i<idx?'✓ ':''}${l}</button>`;
  }).join("");
  const cancel = st==="cancelled" ? "" : `<button class="step-btn cancel" onclick="${fn}('${x.id}','cancelled')">Cancel</button>`;
  return btns+cancel;
}
function lbl(flow,s){ const f=flow.find(([k])=>k===norm(s)); return f?f[1]:(s==="cancelled"?"Cancelled":s); }

/* ---- Task 12: handover OTP (generate on dispatch / verify at counter) ---- */
function orderOtpRow(o){
  if(!SCHEMA.otp) return "";
  const st=norm(o.status);
  if(o.handover_verified_at) return `<div class="otp-row done">✅ Delivered — code verified</div>`;
  if(st!=="out_for_delivery" && !o.handover_otp) return "";
  const codeHTML = o.handover_otp
    ? `<span class="otp-code">${esc(o.handover_otp)}</span><span class="otp-hint">customer must read this back</span>`
    : `<button class="eta-b" onclick="genOrderOtp('${o.id}')">Generate code</button>`;
  return `<div class="otp-row"><span class="otp-lbl">🔑 Handover code:</span> ${codeHTML}
    <button class="eta-b" onclick="verifyOrderOtp('${o.id}')">Enter code</button></div>`;
}
function repairOtpRow(o){
  if(!SCHEMA.otp) return "";
  const st=norm(o.status);
  if(o.handover_verified_at) return `<div class="otp-row done">✅ Collected — code verified</div>`;
  if(st!=="ready" && !o.handover_otp) return "";
  const codeHTML = o.handover_otp
    ? `<span class="otp-code">${esc(o.handover_otp)}</span><span class="otp-hint">customer reads this back</span>`
    : `<button class="eta-b" onclick="genRepairOtp('${o.id}')">Generate code</button>`;
  return `<div class="otp-row"><span class="otp-lbl">🔑 Pickup code:</span> ${codeHTML}
    <button class="eta-b" onclick="verifyRepairOtp('${o.id}')">Verify pickup</button></div>`;
}
async function genOrderOtp(id){
  const o=ORDERS.find(x=>x.id===id); if(!o) return;
  if(o.handover_otp){ renderOrders(); return; }
  try{
    const { data, error } = await sb.rpc("order_make_otp",{p_order_id:id});
    if(error) throw error;
    o.handover_otp=data; renderOrders(); toast("Handover code: "+data+" — tell the customer");
  }catch(e){ toast("Couldn't make code — "+(e&&e.message||e)); }
}
async function genRepairOtp(id){
  const o=REPAIRS.find(x=>x.id===id); if(!o) return;
  if(o.handover_otp){ renderRepairs(); return; }
  try{
    const { data, error } = await sb.rpc("repair_make_otp",{p_repair_id:id});
    if(error) throw error;
    o.handover_otp=data; renderRepairs(); toast("Pickup code: "+data+" — tell the customer");
  }catch(e){ toast("Couldn't make code — "+(e&&e.message||e)); }
}
function verifyOrderOtp(id){
  const o=ORDERS.find(x=>x.id===id); if(!o) return;

function counterScan(){
  if(!window.ProFixScan){ toast("Scanner not loaded — reload the page"); return; }

function routeScan(raw){
  const code=String(raw||"").trim(); if(!code) return;
  const doc=code.match(/\b(PO|SL)-\d{4}-\d{4}\b/i);
  if(doc){ location.href="https://profixworld.com/trade.html#q="+doc[0].toUpperCase(); return; }
  if(/^https?:\/\//i.test(code)){ window.open(code,"_blank","noopener"); return; }
  const pm=code.match(/\/p\/([\w-]+)/);
  if(pm){ window.open("https://profixworld.com/p/"+pm[1],"_blank","noopener"); return; }
  if(/^\d+$/.test(code)){ window.open("https://profixworld.com/p/"+code,"_blank","noopener"); return; }
  toast("Scanned: "+code);
}

async function confirmPay(){
  const { id, alsoDeliver, method } = sheetState; closeSheet();
  const o=ORDERS.find(x=>x.id===id); if(!o) return;
  const patch={}; const n=parseNotes(o.notes); let useNotes=false;
  if(SCHEMA.orderCod) patch.cod_collected=true; else { n.cod=true; useNotes=true; }
  if(SCHEMA.orderPaid) patch.paid_method=method; else { n.pay=method; useNotes=true; }
  if(alsoDeliver) patch.status='delivered';
  if(shift && !n.by){ n.by=shift; useNotes=true; }

function toggleCod(id){

  const patch={}; const n=parseNotes(o.notes); let useNotes=false;
  if(SCHEMA.orderCod) patch.cod_collected=false; else { n.cod=false; useNotes=true; }
  if(SCHEMA.orderPaid) patch.paid_method=null; else { n.pay=null; useNotes=true; }

async function setQuote(id,v){

  else if(SCHEMA.repairNotes){
    const o=REPAIRS.find(x=>x.id===id); let notes=String(o&&o.notes||"").replace(/\s*\[quote:\d+\]/g,"");

async function update(table,id,patch,silent){
  const arr = table==="store_orders"?ORDERS:REPAIRS;
  const row = arr.find(x=>x.id===id); const prev = row?{...row}:null;
  if(row){ Object.assign(row,patch); delete row._fresh; }
  renderAll();
  const { error } = await sb.from(table).update(patch).eq("id",id);
  if(error){ if(row&&prev) Object.assign(row,prev); renderAll(); toast("Update failed — "+error.message); }
  else if(!silent){ toast("Updated ✓"); }
}
async function del(table,id){

  if(table==="store_orders") ORDERS=ORDERS.filter(x=>x.id!==id); else REPAIRS=REPAIRS.filter(x=>x.id!==id);

}

function extractMap(v){

async function placeOrder(e){

/* ---- TODAY = day close ---- */
function renderToday(){
  $("todayDate").textContent = new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long"});
  const tOrders=ORDERS.filter(o=>isToday(o.created_at));
  const collected=tOrders.filter(o=>codState(o)||norm(o.status)==="delivered");
  const tSales=SALES.filter(s=>isToday(s.created_at));
  const tCash=CASH.filter(c=>isToday(c.created_at));

  const orderRev=collected.reduce((a,o)=>a+Number(o.total||0),0);
  const counterRev=tSales.reduce((a,s)=>a+Number(s.amount||0),0);
  const totalSales=orderRev+counterRev;

  let cash=0,upi=0,card=0;
  collected.forEach(o=>{ const m=paidMethod(o)||'cash'; const v=Number(o.total||0); if(m==='upi')upi+=v; else if(m==='card')card+=v; else cash+=v; });
  tSales.forEach(s=>{ const m=s.payment_method||'cash'; const v=Number(s.amount||0); if(m==='upi')upi+=v; else if(m==='card')card+=v; else cash+=v; });

  const cashIn=tCash.filter(c=>c.direction==='in').reduce((a,c)=>a+Number(c.amount||0),0);
  const cashOut=tCash.filter(c=>c.direction==='out').reduce((a,c)=>a+Number(c.amount||0),0);
  const drawer=cash+cashIn-cashOut;

  const gst=collected.reduce((a,o)=>a+gstOf(o.total),0)
          + tSales.reduce((a,s)=>a+Number(s.gst_amount!=null?s.gst_amount:gstOf(s.amount)),0);
  const half=Math.round(gst/2);

  const delivered=tOrders.filter(o=>norm(o.status)==="delivered").length;
  const pending=tOrders.filter(o=>!isDone(o.status)).length;

  let h=`<div class="tbig"><div class="n">${inr(totalSales)}</div><div class="l">total sales today · ${collected.length} order${collected.length===1?"":"s"} + ${tSales.length} counter</div></div>`;
  h+=`<div class="dc-split">
    <div class="s"><div class="n">${inr(cash)}</div><div class="l">💵 Cash</div></div>
    <div class="s"><div class="n">${inr(upi)}</div><div class="l">📲 UPI</div></div>
    <div class="s"><div class="n">${inr(card)}</div><div class="l">💳 Card</div></div></div>`;
  h+=`<div class="card">
    <div class="rowline"><span>Cash sales</span><b>${inr(cash)}</b></div>
    <div class="rowline"><span>＋ Cash in (float)</span><b>${inr(cashIn)}</b></div>
    <div class="rowline"><span>− Cash out (expenses)</span><b>−${inr(cashOut)}</b></div>
    <div class="rowline" style="font-size:1.05rem"><span><b>Cash in drawer</b><br><small style="color:var(--muted);font-weight:600">cash collected − expenses</small></span><b style="color:var(--green)">${inr(drawer)}</b></div></div>`;
  h+=`<div class="card">
    <div class="rowline"><span><b>GST collected today</b> · 18% incl.</span><b>${inr(gst)}</b></div>
    <div class="rowline"><span>CGST 9%</span><b>${inr(half)}</b></div>
    <div class="rowline"><span>SGST 9%</span><b>${inr(gst-half)}</b></div></div>`;
  h+=`<div class="dc-split">
    <div class="s"><div class="n">${delivered}</div><div class="l">Delivered</div></div>
    <div class="s"><div class="n">${pending}</div><div class="l">Pending</div></div>
    <div class="s"><div class="n">${tSales.length}</div><div class="l">Counter sales</div></div></div>`;
  // ---- Day close (per-shop + combined cash tally) ----
  const canSplit=SCHEMA.orderPaid;
  const dcBadge=(d)=>{ const col=d===0?'#12A150':(Math.abs(d)<=50?'#9A6B00':'#E11D2A'), bg=d===0?'#E7F7EE':(Math.abs(d)<=50?'#FFF7E0':'#FDECEC'); return `<span style="background:${bg};color:${col};font-weight:800;font-size:.72rem;padding:.15rem .5rem;border-radius:6px">${d===0?'balanced':(d>0?'+':'')+inr(d)}</span>`; };
  h+=`<div class="card"><div class="chead"><div class="who">🧮 Day close</div></div>`;
  if(!SCHEMA.daycloses){
    h+=`<div class="hintbox">Run the day-close SQL to enable the cash tally.</div>`;
  }else{
    const perShop=SCHEMA.daycloseShop && SCHEMA.shops;
    const shops=shopList();
    const orderHasShop=ORDERS.some(o=>o.shop_id!=null);
    const todayCloses=(DAYCLOSES||[]).filter(c=>c.day===todayISO());
    const repairCashFor=sid=>(REPAIRS||[]).filter(r=>String(r.shop_id)===String(sid)&&isToday(r.visit_updated_at||r.created_at)&&r.amount_collected!=null).reduce((a,r)=>a+Number(r.amount_collected||0),0);
    const orderCashFor=sid=>(orderHasShop?tOrders.filter(o=>norm(o.status)==="delivered"&&String(o.shop_id)===String(sid)):[]).reduce((a,o)=>{const m=paidMethod(o)||'cash';return a+((!canSplit||m==='cash')?Number(o.total||0):0);},0);
    const expectedFor=sid=>Math.round(orderCashFor(sid)+repairCashFor(sid));
    const ordersCountFor=sid=>orderHasShop?tOrders.filter(o=>norm(o.status)==="delivered"&&String(o.shop_id)===String(sid)).length:0;
    if(perShop){
      h+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.6rem">`;
      shops.forEach(s=>{ const on=String(dcShop)===String(s.id); const done=todayCloses.some(c=>String(c.shop_id)===String(s.id)); h+=`<button class="fchip ${on?'active':''}" onclick="setDcShop('${s.id}')">${esc(s.name||("ProFix "+s.id))}${done?' ✓':''}</button>`; });
      h+=`<button class="fchip ${dcShop==='all'?'active':''}" onclick="setDcShop('all')">All (combined)</button></div>`;
      if(dcShop==='all'){
        let eE=0,eC=0,eD=0; const openN=[],closedN=[];
        shops.forEach(s=>{ const c=todayCloses.find(x=>String(x.shop_id)===String(s.id)); if(c){ eE+=c.expected_total||0; eC+=c.counted_cash||0; eD+=c.difference||0; closedN.push(s.name||("ProFix "+s.id)); } else openN.push(s.name||("ProFix "+s.id)); });
        h+=`<div class="rowline"><span><b>Combined · ${closedN.length}/${shops.length} closed</b></span>${closedN.length?dcBadge(eD):''}</div>
          <div class="rowline"><span>Expected cash</span><b>${inr(eE)}</b></div>
          <div class="rowline"><span>Counted cash</span><b>${inr(eC)}</b></div>
          ${openN.length?`<div class="meta">Still open: ${esc(openN.join(", "))}</div>`:`<div class="meta">All shops closed for today ✓</div>`}
          <div class="meta">Combined is computed from each shop's close — not saved.</div>`;
      } else {
        const sid=dcShop, closed=todayCloses.find(x=>String(x.shop_id)===String(sid));
        if(closed){
          h+=`<div class="rowline"><span><b>${esc(shopName(sid))} — closed</b></span>${dcBadge(closed.difference||0)}</div>
            <div class="rowline"><span>Orders</span><b>${closed.orders_count}</b></div>
            <div class="rowline"><span>Expected cash</span><b>${inr(closed.expected_total)}</b></div>
            <div class="rowline"><span>Counted cash</span><b>${inr(closed.counted_cash)}</b></div>
            <div class="meta">One close per shop per day — locked.</div>`;
        } else {
          const exp=expectedFor(sid);
          h+=`<div class="rowline"><span>${esc(shopName(sid))} · delivered ${ordersCountFor(sid)}${!orderHasShop?' <small style="color:var(--muted)">(delivery not shop-tagged; counts walk-ins)</small>':''}</span></div>
            <div class="rowline"><span>Expected cash (orders + walk-ins)</span><b>${inr(exp)}</b></div>
            <div class="set-row"><label>Counted cash (₹)</label><input id="dcCount" class="quote-in" type="number" inputmode="numeric" min="0" placeholder="count ${esc(shopName(sid))} drawer"></div>
            <div class="steps"><button class="step-btn next" onclick="closeDay('${sid}',${exp})">Close ${esc(shopName(sid))}</button></div>`;
        }
      }
    } else {
      // legacy single close (per-shop columns not present)
      const dcDelivered=tOrders.filter(o=>norm(o.status)==="delivered");
      const dcExpectedTotal=dcDelivered.reduce((a,o)=>a+Number(o.total||0),0);
      const dcExpectedCash=Math.round(canSplit?cash:dcExpectedTotal);
      const closed=(DAYCLOSES||[]).find(c=>c.day===todayISO());
      if(closed){ h+=`<div class="rowline"><span><b>Closed for today</b></span>${dcBadge(closed.difference||0)}</div><div class="rowline"><span>Expected</span><b>${inr(closed.expected_total)}</b></div><div class="rowline"><span>Counted</span><b>${inr(closed.counted_cash)}</b></div>`; }
      else { h+=`<div class="rowline"><span>Delivered orders</span><b>${dcDelivered.length}</b></div><div class="rowline"><span>Expected cash</span><b>${inr(dcExpectedCash)}</b></div><div class="set-row"><label>Counted cash (₹)</label><input id="dcCount" class="quote-in" type="number" inputmode="numeric" min="0" placeholder="count the drawer"></div><div class="steps"><button class="step-btn next" onclick="closeDay(null,${dcExpectedCash})">Close day</button></div>`; }
    }
  }
  h+=`<div class="steps"><button class="step-btn" onclick="shareDailySummary()">📱 Share today's summary</button></div>`;
  h+=`</div>`;
  if((DAYCLOSES||[]).length){
    const byDay={}; DAYCLOSES.forEach(c=>{ (byDay[c.day]=byDay[c.day]||[]).push(c); });
    const days=Object.keys(byDay).sort().reverse().slice(0,14);
    h+=`<div class="sec-h">Recent day closes</div>`;
    days.forEach(d=>{ const rows=byDay[d]; let cE=0,cC=0,cD=0; rows.forEach(c=>{cE+=c.expected_total||0;cC+=c.counted_cash||0;cD+=c.difference||0;});
      h+=`<div class="mv"><b>📅 ${esc(d)}</b> ${rows.length>1?dcBadge(cD):''}`;
      rows.forEach(c=>{ h+=`<br><span class="meta">${c.shop_id?esc(shopName(c.shop_id)):"Store"} · exp ${inr(c.expected_total)} / counted ${inr(c.counted_cash)} ${dcBadge(c.difference||0)}</span>`; });
      if(rows.length>1) h+=`<br><span class="meta"><b>Combined</b> · exp ${inr(cE)} / counted ${inr(cC)}</span>`;
      h+=`</div>`; });
  }
  h+=`<div class="act2"><button class="cs" onclick="openCounterSale()">＋ Counter sale</button><button class="ca" onclick="openCash()">Cash in / out</button></div>`;

  if(!SCHEMA.sales) h+=`<div class="hintbox">Counter sales need the one-time DB update — run the SQL to enable.</div>`;
  if(!SCHEMA.cash) h+=`<div class="hintbox">The cash log needs the one-time DB update — run the SQL to enable.</div>`;
  if(!SCHEMA.orderPaid) h+=`<div class="hintbox">Order payment methods are being stored in notes for now. Run the SQL to add the clean <b>paid_method</b> column.</div>`;

  if(tSales.length){
    h+=`<div class="sec-h">Today’s counter sales</div>`+tSales.map(s=>
      `<div class="mv">💰 <b>${inr(s.amount)}</b> · ${esc(PAYLBL[s.payment_method]||"Cash")}${s.note?" · "+esc(s.note):""}${s.staff?' <span class="meta">('+esc(s.staff)+')</span>':""}<button class="x" onclick="delSale('${s.id}')">✕</button></div>`).join("");
  }
  if(tCash.length){
    h+=`<div class="sec-h">Today’s cash movements</div>`+tCash.map(c=>
      `<div class="mv">${c.direction==='out'?"🔴 Out":"🟢 In"} · <b>${inr(c.amount)}</b>${c.reason?" · "+esc(c.reason):""}<button class="x" onclick="delCash('${c.id}')">✕</button></div>`).join("");
  }
  $("todayBox").innerHTML=h;
}
function todayISO(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function setDcShop(v){ dcShop=v; renderToday(); }
async function closeDay(shopId, expectedCash){
  if(!SCHEMA.daycloses){ toast("Run the day-close SQL first"); return; }
  const el=$("dcCount"); const cc=parseInt(el&&el.value,10);
  if(isNaN(cc)){ toast("Enter the counted cash"); if(el) el.focus(); return; }
  const day=todayISO();
  const hasShop = shopId && shopId!=="null" && SCHEMA.daycloseShop;
  const orderHasShop=ORDERS.some(o=>o.shop_id!=null);
  const cnt = (hasShop && orderHasShop)
    ? ORDERS.filter(o=>isToday(o.created_at)&&norm(o.status)==="delivered"&&String(o.shop_id)===String(shopId)).length
    : ORDERS.filter(o=>isToday(o.created_at)&&norm(o.status)==="delivered").length;
  const exp=Math.round(expectedCash||0), diff=cc-exp;
  const row={day, orders_count:cnt, expected_total:exp, counted_cash:cc, difference:diff};
  if(hasShop) row.shop_id=parseInt(shopId,10);
  const { error }=await sb.from("store_daycloses").insert(row);
  const reload=async()=>{ try{ const x=await sb.from("store_daycloses").select("*").order("day",{ascending:false}).limit(60); DAYCLOSES=x.data||[]; }catch(_){} };
  if(error){
    await reload();
    if(/duplicate|unique|conflict/i.test(error.message)){ toast(hasShop?("Already closed "+shopName(shopId)+" today"):"Already closed today"); renderToday(); return; }
    toast("Couldn't close — "+error.message); return;
  }
  await reload();
  toast(diff===0?"Closed · balanced ✓":("Closed · "+(diff>0?"+":"")+inr(diff)));
  renderToday();
}
/* ---- daily WhatsApp summary (staff-initiated, no number, zero cost) ---- */
function buildDailySummary(){
  const dt=new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
  const tOrders=ORDERS.filter(o=>isToday(o.created_at));
  const delivered=tOrders.filter(o=>norm(o.status)==="delivered");
  const cancelled=tOrders.filter(o=>norm(o.status)==="cancelled").length;
  const counterSales=(SALES||[]).filter(s=>isToday(s.created_at));
  const salesTotal=delivered.reduce((a,o)=>a+Number(o.total||0),0)+counterSales.reduce((a,s)=>a+Number(s.amount||0),0);
  const repairsDone=(REPAIRS||[]).filter(r=>norm(r.status)==="delivered"&&isToday(r.updated_at||r.created_at)).length;
  const tally={};
  delivered.forEach(o=>(o.items||[]).forEach(i=>{ const n=i.name||"Item"; tally[n]=(tally[n]||0)+Number(i.qty||0); }));
  const top=Object.entries(tally).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([n,q])=>`${n} x${q}`).join(", ")||"—";
  const closed=(DAYCLOSES||[]).find(c=>c.day===todayISO());
  let s=`ProFix — Daily Summary (${dt})\n`;
  s+=`Orders delivered: ${delivered.length} | Cancelled: ${cancelled}\n`;
  s+=`Sales total: ${inr(salesTotal)}\n`;
  s+=`Repairs completed: ${repairsDone}\n`;
  s+=`Top items: ${top}\n`;
  if(closed){ const d=closed.difference||0; const dstr=(d>0?"+":d<0?"−":"")+inr(Math.abs(d)); s+=`Day close: expected ${inr(closed.expected_total)} · counted ${inr(closed.counted_cash)} · diff ${dstr}`; }
  else s+=`Day not closed yet`;
  return s;
}
function shareDailySummary(){ window.open("https://wa.me/?text="+encodeURIComponent(buildDailySummary()),"_blank","noopener"); }

let tt; function toast(m,cls){ const t=$("toast"); t.textContent=m; t.className="toast show"+(cls?" "+cls:""); clearTimeout(tt); tt=setTimeout(()=>t.className="toast",cls==="alert"?4200:1800); }
</script>
<script>
/* PWA install button */
var _pfInstall=null;
function _pfShowInstall(v){var b=document.getElementById("installBtn");if(b)b.style.display=v?"inline-flex":"none";}
window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();_pfInstall=e;_pfShowInstall(true);});
window.addEventListener("appinstalled",function(){_pfShowInstall(false);});
document.addEventListener("DOMContentLoaded",function(){var b=document.getElementById("installBtn");if(!b)return;
  _pfShowInstall(true); /* always visible: beforeinstallprompt is unreliable */
  b.addEventListener("click",async function(){
    if(_pfInstall){_pfInstall.prompt();await _pfInstall.userChoice;_pfInstall=null;_pfShowInstall(false);return;}
    _pfInstallHelp();
  });});

function _pfInAppBrowser(){
  var u=navigator.userAgent.toLowerCase();
  return u.indexOf("; wv")>-1||u.indexOf("fban")>-1||u.indexOf("fbav")>-1||u.indexOf("fb_iab")>-1
       ||u.indexOf("instagram")>-1||u.indexOf("micromessenger")>-1||u.indexOf("snapchat")>-1;
}
function _pfOpenInChrome(){
  location.href="intent://"+location.host+location.pathname+location.search+"#Intent;scheme=https;package=com.android.chrome;end";
}
function _pfInstallHelp(){
  var u=navigator.userAgent.toLowerCase();
  if(window.matchMedia("(display-mode: standalone)").matches||navigator.standalone){
    alert("Already installed \u2705 \u2014 look for the icon on your home screen."); return;
  }
  // An in-app browser (WhatsApp, Instagram, Facebook) is a WebView. It can ONLY make a
  // shortcut, never a real installed app. This is the usual reason people get a shortcut.
  if(_pfInAppBrowser()){
    if(u.indexOf("android")>-1){
      if(confirm("You opened this from inside another app (like WhatsApp).\n\nThat can only make a SHORTCUT \u2014 not a real app icon.\n\nTap OK to reopen in Chrome, then tap the Install button again."))
        _pfOpenInChrome();
    } else {
      alert("You opened this from inside another app (like WhatsApp).\n\nThat can only make a shortcut.\n\nTap the \u2026 menu and choose \"Open in Safari\" (iPhone) or \"Open in Chrome\" (Android), then tap Install again.");
    }
    return;
  }
  if(u.indexOf("iphone")>-1||u.indexOf("ipad")>-1||u.indexOf("ipod")>-1){
    alert("To install on iPhone:\n1. Tap Share \u2b06 at the bottom of Safari\n2. Scroll down \u2192 \"Add to Home Screen\"\n3. Tap Add"); return;
  }
  if(u.indexOf("samsungbrowser")>-1){
    alert("To install:\nMenu \u2630 (bottom) \u2192 \"Add page to\" \u2192 \"Home screen\""); return;
  }
  if(u.indexOf("firefox")>-1||u.indexOf("fxios")>-1){
    alert("Firefox cannot install web apps properly.\nPlease open this page in Chrome, then tap Install."); return;
  }
  alert("Chrome is not offering the install yet.\n\nAlmost always this means an OLD ProFix app is still on this phone:\n\n1. Long-press EVERY old ProFix icon \u2192 Uninstall\n2. Open profixworld.com/pwa-check \u2192 tap \"Reset ProFix on this phone\"\n3. Close Chrome fully, reopen, try Install again.");
}
