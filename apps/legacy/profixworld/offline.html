<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Offline — ProFix</title>
<meta name="theme-color" content="#E11D2A">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="shortcut icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;
  background:linear-gradient(150deg,#FF2A45,#FF7A1A);color:#fff;text-align:center;padding:24px}
.wrap{max-width:28rem}
.bolt{width:84px;height:84px;border-radius:24px;background:rgba(255,255,255,.16);display:grid;place-items:center;margin:0 auto 1.2rem;font-size:2.6rem}
h1{font-size:1.9rem;font-weight:800;margin-bottom:.5rem}
p{font-size:1.05rem;opacity:.92;margin-bottom:1.6rem;line-height:1.5}
button{background:#fff;color:#E11D2A;font-weight:700;padding:.8rem 1.5rem;border:none;border-radius:999px;font-size:.95rem;cursor:pointer;font-family:inherit}
button:active{transform:scale(.97)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="bolt">📶</div>
    <h1>You're offline</h1>
    <p>ProFix will load the moment you're back online. Your cart and saved details are safe on this device.</p>
    <button onclick="location.reload()">↻ Try again</button>
  </div>
</body>
</html>
